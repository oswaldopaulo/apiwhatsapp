[program:apiwhatsapp-reverb]
process_name=%(program_name)s
command=php /var/www/apiwhatsapp/artisan reverb:start --host=0.0.0.0 --port=8080
directory=/var/www/apiwhatsapp
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/log/supervisor/apiwhatsapp-reverb.log
stopwaitsecs=60
